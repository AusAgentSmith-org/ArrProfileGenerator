<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ProfSync{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.5;
        }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .navbar {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .navbar .logo {
            font-size: 18px;
            font-weight: 700;
            color: #f0f6fc;
        }
        .navbar nav a {
            color: #8b949e;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .navbar nav a:hover, .navbar nav a.active {
            color: #f0f6fc;
            background: #30363d;
            text-decoration: none;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
        }
        .stat-card .label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: #f0f6fc;
            margin-top: 4px;
        }

        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
            font-size: 14px;
            color: #f0f6fc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            text-align: left;
            padding: 8px 12px;
            background: #0d1117;
            color: #8b949e;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
        }
        td {
            padding: 8px 12px;
            border-top: 1px solid #21262d;
        }
        tr:hover td { background: #1c2128; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .tier-a-plus { background: #1f6feb33; color: #58a6ff; }
        .tier-a { background: #23863633; color: #3fb950; }
        .tier-b-plus { background: #2ea04333; color: #56d364; }
        .tier-b { background: #56d36433; color: #7ee787; }
        .tier-c-plus { background: #d2992233; color: #e3b341; }
        .tier-c { background: #bb800933; color: #d29922; }
        .tier-d { background: #da363333; color: #f85149; }
        .tier-f { background: #8b000033; color: #ff7b72; }
        .tier-unranked { background: #30363d; color: #8b949e; }

        .badge-movie { background: #8957e533; color: #bc8cff; }
        .badge-series { background: #1f6feb33; color: #58a6ff; }
        .badge-res { background: #23863633; color: #3fb950; }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 900px) {
            .two-col { grid-template-columns: 1fr; }
        }

        .scroll-table {
            max-height: 600px;
            overflow-y: auto;
        }

        .refresh-note {
            font-size: 11px;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <span class="logo">ProfSync</span>
        <nav>
            <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/groups" class="{% if active == 'groups' %}active{% endif %}">Groups</a>
            <a href="/releases" class="{% if active == 'releases' %}active{% endif %}">Releases</a>
        </nav>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
