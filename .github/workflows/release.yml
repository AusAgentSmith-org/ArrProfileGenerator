name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: [self-hosted, node-b]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build binary
        run: pyinstaller build.spec --clean -y

      - name: Rename binary
        run: mv dist/profsync-wizard dist/profsync-wizard-linux

      - uses: actions/upload-artifact@v4
        with:
          name: profsync-wizard-linux
          path: dist/profsync-wizard-linux

  # Windows build disabled to avoid GitHub-hosted runner minutes
  # build-windows:
  #   runs-on: windows-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.12'
  #     - run: |
  #         pip install pyinstaller
  #         pip install -r requirements.txt
  #     - run: pyinstaller build.spec --clean -y
  #     - run: mv dist/profsync-wizard.exe dist/profsync-wizard-windows.exe
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: profsync-wizard-windows
  #         path: dist/profsync-wizard-windows.exe

  release:
    needs: [build-linux]
    runs-on: [self-hosted, node-b]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
